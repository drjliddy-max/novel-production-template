name: ci

# The audiobook status tracker decides whether a book's voice files can be trusted.
# It shipped with two defects that made it unable to tell the truth (a required field
# nothing ever wrote, so every chapter was permanently STALE; and an orphan-chunk blind
# spot). Nothing caught either, because this repo had no CI at all. Now it does.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: tracker regression suite
        run: npm test
